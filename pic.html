<!DOCTYPE html>
<html>
<head>
  <title>Memories ❤️</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(to bottom right, black 0%, navy 50%, gold 100%);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(2, 300px);
      gap: 30px;
    }

    .gallery img {
      width: 300px;
      height: 300px;
      object-fit: cover;
      border: 3px solid gold;
      border-radius: 15px;
      box-shadow: 0 0 20px gold;
      transition: 0.4s;
    }

    .gallery img:hover {
      transform: scale(1.08);
      box-shadow: 0 0 40px gold;
    }
  </style>

</head>

<body>

  <div class="gallery">
    <img src="pic1.jpg">
    <img src="pic2.jpg">
    <img src="pic3.jpg">
    <img src="pic4.jpg">
  </div>

</body>
</html>
