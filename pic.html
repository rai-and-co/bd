<!DOCTYPE html>
<html>
<head>
  <title>Memories ❤️</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(to bottom right, black 0%, navy 50%, gold 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 0;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(2, 300px);
      gap: 30px;
    }

    .gallery img {
      width: 100%;
      height: 300px;
      object-fit: cover;
      border: 3px solid gold;
      border-radius: 15px;
      box-shadow: 0 0 20px gold;
      transition: 0.4s;
    }

    .gallery img:hover {
      transform: scale(1.08);
      box-shadow: 0 0 40px gold;
    }

    /* BIG IMAGE FIXED */
    .third {
      grid-column: span 2;
      height: 300px;
    }

  </style>
</head>

<body>

  <div class="gallery">
    <img src="1.png" alt="memory 1">
    <img src="2.jpeg" alt="memory 2">
    <img src="3.jpg" class="third" alt="memory 3">
    <img src="4.jpg" alt="memory 4">
    <img src="5.jpg" alt="memory 5">
  </div>

</body>
</html>
